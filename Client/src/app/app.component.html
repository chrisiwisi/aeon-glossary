<div class="content-wrapper">
  <h3>{{title}}</h3>
  <a class="credits" href="https://docs.google.com/document/d/1u3q2ngOWhVvixLbz3PiR-4HG0A1OpcAzCM-9cveigu4/edit#heading=h.1suxi92ppa1y">Powered by THE LAW OF AT:O</a>
  <div class="form" #searchBar>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
    </svg>
    <input type="text" class="search-bar" placeholder="Search anything..." [(ngModel)]="searchTerm">
  </div>

  <div class="card-container">
    <app-rules-card *ngFor="let rule of rules | search: searchTerm" [rule]="rule"></app-rules-card>
  </div>

  <div class="chatbot-icon" (click)="toggleChatbox()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chat-right-fill" viewBox="0 0 16 16">
      <path d="M14 0a2 2 0 0 1 2 2v12.793a.5.5 0 0 1-.854.353l-2.853-2.853a1 1 0 0 0-.707-.293H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2z"/>
    </svg>
  </div>

  <div class="chatbox" [ngClass]="{ open: chatBox }">
    <div class="header">
      <h2>Aion glossary</h2>
    </div>
    <div>
      hier kommt die chatbox hin
    </div>
    <br>
    <div class="footer">
      hier kommt die Textbox hin
    </div>
  </div>
</div>
