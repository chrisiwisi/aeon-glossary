<div #conversationContainer class="conversation-container">
  @for (message of messages().reverse(); track message) {
    <div class="message-container" [ngClass]="{'user-message': message.role === 'user', 'bot-message': message.role === 'assistant'}">
      <div class="message">
        <p>{{ message.content[0].text.value }}</p>
      </div>
    </div>
  }
</div>
