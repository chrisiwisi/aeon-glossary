<h2>Messages</h2>

@for (message of messages; track $index) {
  <div class="message-wrapper">
    @for (result of message | decode: alphabet; track $index) {
      <div class="letter-wrapper">
        @if (result.letter) {
          <p>{{ result.letter }}</p>
        }
        @if (result.URL && !result.letter) {
          <img [src]="result.URL" alt="unknown letter">
        }
      </div>
    }
    <span class="delete-message">
      <button nz-button nzType="primary" (click)="deleteMessage($index)">X</button>
    </span>
  </div>
}

<div>
  <button (click)="openMessageModular()">+</button>
</div>

<div class="letters-header-wrapper">
  <h2>Letters</h2>
  <span>
    <button class="save-btn" (click)="reloadFromLocalStorage()">Reload</button>
    <button class="save-btn" (click)="saveCurrentProgress()">Save</button>
    <button class="save-btn" (click)="reset()">Reset(pls save!)</button>
  </span>
</div>

<div class="letter-container">
  @for (letter of alphabet | keyvalue; track $index) {
    <app-letter [letter]="letter.value"/>
  }
</div>

<button nz-button nzType="primary" (click)="addLetter()">Add letter</button>
